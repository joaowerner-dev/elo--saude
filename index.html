<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bem-vindo | Elo Saúde</title>
  <meta name="description" content="Elo Saúde - informação, acolhimento e cuidado para famílias de crianças atípicas.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="pagina-loader">

  <main class="loader-screen">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <section class="loader-box" aria-labelledby="titulo-principal">
      <span class="loader-badge">Elo Saúde</span>

      <p class="loader-topo">Bem-vindo ao</p>

      <h1 id="titulo-principal" class="logo-animada" aria-label="Elo Saúde">
        <span class="letra letra-1">E</span>
        <span class="letra letra-2">l</span>
        <span class="letra letra-3">o</span>
        <span class="espaco"></span>
        <span class="letra letra-4">S</span>
        <span class="letra letra-5">a</span>
        <span class="letra letra-6">ú</span>
        <span class="letra letra-7">d</span>
        <span class="letra letra-8">e</span>
      </h1>

      <p class="loader-texto">
        Inclusão infantil, acolhimento, cuidado e informação para famílias.
      </p>

      <p class="loader-frase" id="fraseDinamica">
        Preparando um espaço especial para você...
      </p>

      <div
        class="barra-carregamento"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
      >
        <div class="progresso" id="progresso"></div>
      </div>

      <p id="contador" class="contador">
        Abrindo página principal em 5 segundos...
      </p>

      <div class="loader-acoes">
        <a href="./pages/home.html" class="btn-entrar">Entrar agora</a>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
